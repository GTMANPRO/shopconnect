name: ShopConnect Asset Pack

on:
  workflow_dispatch:

jobs:
  pack-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Run asset pack script
        run: |
          chmod +x scripts/asset_pack.sh
          ./scripts/asset_pack.sh

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopconnect-assets-${{ steps.version.outputs.version }}
          path: |
            shopconnect_assets_${{ steps.version.outputs.version }}_*.zip
            VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "ShopConnect Assets ${{ steps.version.outputs.version }}"
          body: |
            Automated asset release for version **${{ steps.version.outputs.version }}**.
            Generated by CI pipeline.
          files: |
            shopconnect_assets_${{ steps.version.outputs.version }}_*.zip
            VERSION
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

