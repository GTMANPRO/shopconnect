name: ShopConnect Asset Pack

on:
  workflow_dispatch:

jobs:
  pack-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Run asset pack script
        run: |
          chmod +x scripts/asset_pack.sh
          ./scripts/asset_pack.sh

      - name: Upload ZIP + VERSION
        uses: actions/upload-artifact@v4
        with:
          name: shopconnect-assets
          path: |
            shopconnect_assets_*.zip
            VERSION

